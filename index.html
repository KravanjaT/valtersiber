<!DOCTYPE html>
<html lang="sl"><head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>Žganje Valter-Siber | Tolminska Dežela</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;600&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#d4af37;--gl:#f0d060;--dk:#060402;--nav:64px;--sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px)}
html,body{width:100%;height:100%;overflow:hidden;background:var(--dk);font-family:'Cinzel',serif;color:#fff}
body{cursor:pointer}

#cDiamond{display:none}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;padding:0 22px;padding-top:var(--sat);height:calc(var(--nav)+var(--sat));background:rgba(4,2,1,.96);border-bottom:1px solid rgba(212,175,55,.25);backdrop-filter:blur(12px);gap:14px}
.nl img{height:44px;filter:drop-shadow(0 1px 6px rgba(0,0,0,.7));flex-shrink:0;border-radius:50%}
.nv{display:flex;flex:1;justify-content:center;align-items:stretch;height:calc(var(--nav)+var(--sat))}
.nv a{font-size:.72rem;font-weight:600;letter-spacing:.26em;text-transform:uppercase;color:rgba(212,175,55,.7);text-decoration:none;padding:var(--sat) 16px 0;display:flex;align-items:center;transition:color .2s,background .2s;position:relative;white-space:nowrap}
.nv a::after{content:'';position:absolute;bottom:0;left:16px;right:16px;height:2px;background:var(--gold);transform:scaleX(0);transition:transform .25s;transform-origin:center}
.nv a:hover{color:#fff;background:rgba(212,175,55,.07)}
.nv a.on{color:var(--gold)}
.nv a.on::after{transform:scaleX(1)}
.lsw{display:flex;align-items:center;gap:4px;flex-shrink:0;border-left:1px solid rgba(212,175,55,.22);padding-left:14px}
.lb{cursor:pointer;font-family:'Segoe UI Emoji','Apple Color Emoji','Noto Color Emoji',sans-serif;font-size:22px;line-height:1;background:rgba(255,255,255,.04);border:1px solid rgba(212,175,55,.2);border-radius:4px;padding:4px 8px;opacity:.7;transition:all .2s;display:flex;align-items:center;justify-content:center}
.lb:hover{opacity:1;border-color:rgba(212,175,55,.6);background:rgba(212,175,55,.1);transform:scale(1.06)}
.lb.on{opacity:1;border-color:var(--gold);background:rgba(212,175,55,.2);box-shadow:0 0 8px rgba(212,175,55,.3)}
@media(max-width:680px){nav{padding:0 10px;padding-top:var(--sat);gap:8px}.nl img{height:34px}.nv a{font-size:.52rem;padding:var(--sat) 9px 0;letter-spacing:.16em}.lsw{padding-left:10px}.lb{font-size:20px;padding:3px 6px}}
@media(max-width:400px){.nv a{font-size:.44rem;padding:var(--sat) 6px 0}.lb{font-size:18px;padding:3px 5px}}

/* PAGES */
.pg{position:fixed;inset:0;z-index:3;display:flex;flex-direction:column;align-items:center;justify-content:center;padding-top:calc(var(--nav)+var(--sat));padding-bottom:var(--sab);opacity:0;pointer-events:none;transition:opacity .5s}
.pg.on{opacity:1;pointer-events:all}

/* HOME */
#pg-home{padding:0;overflow:hidden}
.hbg{position:absolute;top:-10%;left:-8%;right:-8%;bottom:-10%;background-size:cover;background-position:65% center;background-repeat:no-repeat;will-change:transform}
.hov{position:absolute;inset:0;z-index:1;pointer-events:none;background:linear-gradient(to right,rgba(4,2,1,.82) 0%,rgba(4,2,1,.55) 28%,rgba(4,2,1,.18) 52%,transparent 70%),linear-gradient(to bottom,rgba(4,2,1,.3) 0%,transparent 18%,transparent 70%,rgba(4,2,1,.65) 87%,rgba(4,2,1,.9) 100%)}
@media(max-width:600px){.hov{background:rgba(4,2,1,.48),linear-gradient(to bottom,rgba(4,2,1,.6) 0%,rgba(4,2,1,.15) 25%,rgba(4,2,1,.15) 60%,rgba(4,2,1,.8) 85%,rgba(4,2,1,.95) 100%)}}
.hcnt{position:absolute;inset:0;z-index:2;display:flex;align-items:center;padding:calc(var(--nav)+var(--sat)+8px) clamp(20px,5vw,60px) calc(var(--sab)+8px)}
@media(max-width:600px){.hcnt{align-items:flex-end;justify-content:center;padding-bottom:calc(var(--sab)+36px)}}
.htxt{display:flex;flex-direction:column;align-items:flex-start;gap:.8rem;width:clamp(280px,45vw,540px);will-change:transform;margin-left:clamp(40px,10vw,160px)}
@media(max-width:900px){.htxt{margin-left:clamp(20px,5vw,60px)}}
@media(max-width:600px){.htxt{align-items:center;text-align:center;width:min(90vw,380px);gap:.6rem;margin-left:0}}
.orn{display:flex;align-items:center;gap:.8rem;opacity:0;animation:fu 1.3s ease .3s forwards}
.ol{width:44px;height:1px;background:linear-gradient(to right,transparent,var(--gold))}.olr{background:linear-gradient(to left,transparent,var(--gold))}
.od{width:6px;height:6px;background:var(--gold);transform:rotate(45deg)}
.hsub{font-size:clamp(.6rem,1.4vw,.85rem);letter-spacing:.45em;text-transform:uppercase;color:#fff;text-shadow:0 1px 12px rgba(0,0,0,1),0 0 30px rgba(0,0,0,.9);opacity:0;animation:fu 1.2s ease .5s forwards;font-weight:600}
.htit{font-family:'Cinzel Decorative',serif;font-weight:700;font-size:clamp(2rem,5.5vw,6rem);line-height:1.25;letter-spacing:.04em;color:var(--gold);text-shadow:0 0 40px rgba(212,175,55,.6),0 2px 0 rgba(0,0,0,.9),0 4px 20px rgba(0,0,0,1);opacity:0;animation:fu 1.5s ease .1s forwards;user-select:none}
.hdiv{width:80px;height:1px;background:linear-gradient(to right,var(--gold),transparent);opacity:0;animation:fu 1.2s ease .7s forwards}
@media(max-width:600px){.hdiv{background:linear-gradient(to right,transparent,var(--gold),transparent)}}
.htag{font-size:clamp(.58rem,1.3vw,.82rem);letter-spacing:.32em;color:#fff;text-transform:uppercase;text-shadow:0 1px 10px rgba(0,0,0,1);opacity:0;animation:fu 1.2s ease .9s forwards;font-weight:600}
.hmot{font-family:'EB Garamond',serif;font-size:clamp(1rem,1.65vw,1.25rem);color:rgba(255,248,220,.95);line-height:1.78;border-left:2px solid rgba(212,175,55,.5);padding-left:16px;opacity:0;animation:fu 1.1s ease 1.1s forwards;text-shadow:0 1px 8px rgba(0,0,0,.95)}
@media(max-width:600px){.hmot{border-left:none;border-top:1px solid rgba(212,175,55,.3);padding:10px 0 0}}
.hmot em{color:var(--gold);font-style:normal}
.hcta{display:none;font-size:.62rem;letter-spacing:.32em;text-transform:uppercase;padding:13px 34px;border:1px solid rgba(212,175,55,.6);color:#fff;background:rgba(4,2,1,.55);cursor:pointer;opacity:0;animation:fu 1s ease 1.3s forwards;transition:background .3s,color .3s}
.hcta:hover,.hcta:active{background:rgba(212,175,55,.2)}
@media(max-width:600px){.hcta{display:block}}

/* PONUDBA */
#pg-pon{justify-content:space-between;padding-bottom:calc(var(--sab)+8px);padding-top:calc(var(--nav)+var(--sat)+4px)}
.ph{text-align:center;display:flex;flex-direction:column;align-items:center;gap:7px;padding:clamp(38px,7vh,72px) 1rem clamp(6px,1.2vh,14px);flex-shrink:0}
.ph-t{font-family:'Cinzel Decorative',serif;font-size:clamp(1.3rem,3vw,2.4rem);color:var(--gold);letter-spacing:.1em;text-shadow:0 0 24px rgba(212,175,55,.5)}
.ph-s{font-size:clamp(.44rem,.95vw,.64rem);letter-spacing:.32em;text-transform:uppercase;color:rgba(255,255,255,.75);font-weight:600;display:none}
@media(hover:none){.ph-s{display:block}}
.ph-d{display:none}
.co{width:100%;overflow:hidden;flex:1;display:flex;align-items:center;mask-image:linear-gradient(to right,transparent,black 4%,black 96%,transparent);-webkit-mask-image:linear-gradient(to right,transparent,black 4%,black 96%,transparent)}
.ct{display:flex;align-items:center;gap:clamp(10px,2vw,32px);width:max-content;will-change:transform;cursor:grab;user-select:none;padding:8px 0 20px}
.ct:active{cursor:grabbing}
.bc{display:flex;flex-direction:column;align-items:center;gap:10px;flex-shrink:0;width:clamp(100px,13vw,180px);cursor:pointer;position:relative;transition:transform .45s cubic-bezier(.22,.61,.36,1),opacity .45s;z-index:1}
.bc.sel{transform:translateY(-22px) scale(1.18) !important;z-index:10}
.bi{width:100%;height:clamp(220px,34vh,440px);display:flex;align-items:flex-end;justify-content:center;flex-shrink:0;overflow:visible;filter:drop-shadow(0 14px 28px rgba(0,0,0,.55)) drop-shadow(0 4px 8px rgba(0,0,0,.3));transition:filter .4s;background:transparent;overflow:visible}
.bc.sel .bi{filter:drop-shadow(0 20px 40px rgba(0,0,0,.7)) drop-shadow(0 0 28px rgba(212,175,55,.55)) drop-shadow(0 0 55px rgba(212,175,55,.22))}
.ct.hs .bc:not(.sel){opacity:.55;transform:scale(.97)}
.bi img{width:100%;height:100%;object-fit:contain;object-position:center bottom;pointer-events:none;display:block;mix-blend-mode:multiply}
.bn{font-size:clamp(.7rem,1.4vw,1.05rem);font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#fff;text-align:center;line-height:1.5;transition:color .3s;text-shadow:0 2px 10px rgba(0,0,0,1)}
.bvol{font-size:clamp(.55rem,1vw,.74rem);letter-spacing:.18em;text-transform:uppercase;color:#fff;text-align:center;opacity:.75;text-shadow:0 2px 8px rgba(0,0,0,1);margin-top:-4px}
.bc.sel .bvol{color:var(--gold);opacity:1}
.bc.sel .bn{color:var(--gold)}

/* O NAS */
.ow{flex:1;display:flex;align-items:center;justify-content:center;padding:0 clamp(16px,4vw,60px);max-width:880px;width:100%;margin:0 auto;gap:clamp(18px,3.5vw,50px)}
.ol2{flex-shrink:0;width:clamp(90px,14vw,190px)}
.ol2 img{width:100%;border-radius:8px;filter:drop-shadow(0 4px 20px rgba(0,0,0,.8))}
.oc{flex:1;display:flex;flex-direction:column;gap:11px}
.ot{font-family:'Cinzel Decorative',serif;font-size:clamp(1rem,2.3vw,1.75rem);color:var(--gold);letter-spacing:.1em}
.os{font-size:.52rem;letter-spacing:.38em;text-transform:uppercase;color:rgba(212,175,55,.6)}
.od2{width:40px;height:1px;background:linear-gradient(to right,var(--gold),transparent);margin:3px 0}
.op{font-family:'EB Garamond',serif;font-size:clamp(.95rem,1.55vw,1.15rem);line-height:1.88;color:rgba(255,248,225,.82)}
.op em{color:var(--gl);font-style:italic}
.om{display:inline-flex;align-items:center;gap:9px;margin-top:5px;font-size:.5rem;letter-spacing:.34em;text-transform:uppercase;color:rgba(212,175,55,.6)}
.om::before,.om::after{content:'';width:22px;height:.5px;background:rgba(212,175,55,.32)}
@media(max-width:600px){.ow{flex-direction:column;align-items:center;text-align:center;padding:0 20px;gap:14px}.ol2{width:clamp(80px,35vw,140px)}.oc{align-items:center}.od2{margin:3px auto}}

/* KONTAKT */
.kw{flex:1;display:flex;align-items:center;justify-content:center;padding:0 clamp(12px,3vw,40px);width:100%;gap:clamp(14px,3vw,36px)}
.kc{border:1px solid rgba(212,175,55,.28);padding:clamp(18px,3vh,40px) clamp(18px,3.5vw,48px);max-width:360px;width:100%;text-align:center;position:relative;background:rgba(6,3,1,.88);flex-shrink:0;backdrop-filter:blur(6px)}
.kc::before{content:'';position:absolute;top:0;left:10%;right:10%;height:1px;background:linear-gradient(to right,transparent,var(--gold),transparent)}
.kc::after{content:'';position:absolute;bottom:0;left:10%;right:10%;height:1px;background:linear-gradient(to right,transparent,rgba(212,175,55,.38),transparent)}
.kt{font-family:'Cinzel Decorative',serif;font-size:clamp(.95rem,2.1vw,1.58rem);color:var(--gold);letter-spacing:.1em;margin-bottom:5px}
.ks{font-size:.5rem;letter-spacing:.34em;text-transform:uppercase;color:rgba(212,175,55,.52);margin-bottom:16px}
.kd{width:38px;height:1px;background:linear-gradient(to right,transparent,var(--gold),transparent);margin:0 auto 16px}
.ki{display:flex;flex-direction:column;gap:10px}
.kr{display:flex;align-items:center;justify-content:center;gap:10px}
.kico{width:24px;height:24px;border:1px solid rgba(212,175,55,.26);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;color:var(--gold)}
.ktx{font-family:'EB Garamond',serif;font-size:clamp(.92rem,1.4vw,1.08rem);color:rgba(255,248,220,.88)}
.ktx a{color:inherit;text-decoration:none;transition:color .2s}
.ktx a:hover{color:var(--gold)}
.ksep{width:1px;height:16px;background:rgba(212,175,55,.15);margin:2px auto}
.mw{flex:1;min-width:0;border:1px solid rgba(212,175,55,.2);overflow:hidden;max-width:480px;width:100%;height:clamp(200px,36vh,400px)}
.mw iframe{width:100%;height:100%;border:none;filter:grayscale(30%) sepia(15%) brightness(.9)}
@media(max-width:600px){.kw{flex-direction:column;align-items:center;padding:0 16px;gap:14px}.mw{max-width:100%;height:clamp(180px,35vw,280px)}.kc{max-width:100%}}

/* MODAL */
#ma{position:fixed;inset:0;z-index:7000;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;background:rgba(2,1,0,0);transition:background .4s,opacity .35s}
#ma.on{pointer-events:all;opacity:1;background:rgba(2,1,0,.92)}
.ac{position:absolute;top:0;right:0;font-family:'Cinzel',serif;font-size:.66rem;font-weight:600;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);background:rgba(4,2,1,.95);border:1px solid rgba(212,175,55,.4);border-top:none;border-right:none;padding:13px 26px;cursor:pointer;transition:background .2s,color .2s;z-index:3}
.ac:hover{background:rgba(212,175,55,.14);color:#fff}
@media(max-width:600px){.ac{top:auto;bottom:0;right:0;left:0;border:none;border-top:1px solid rgba(212,175,55,.3);text-align:center;padding:16px}}
.ai{position:relative;display:flex;align-items:center;gap:clamp(20px,5vw,70px);max-width:780px;width:90%;padding:0 20px}
@media(max-width:600px){.ai{flex-direction:column;align-items:center;text-align:center;padding:20px 20px 60px;gap:16px;max-height:calc(100vh - 80px);overflow-y:auto}}
.abw{display:flex;flex-direction:column;align-items:center;gap:14px;flex-shrink:0}
.abimg{width:clamp(90px,14vw,190px);filter:drop-shadow(0 0 40px rgba(212,175,55,.55));transform:scale(.15) rotate(-360deg);opacity:0;transition:transform .75s cubic-bezier(.22,.61,.36,1),opacity .4s}
#ma.on .abimg{transform:scale(1) rotate(0deg);opacity:1}
.an{font-family:'Cinzel Decorative',serif;font-size:clamp(1.3rem,3.5vw,2.6rem);color:var(--gold);text-shadow:0 0 22px rgba(212,175,55,.6);opacity:0;transform:translateY(12px);transition:opacity .4s ease .48s,transform .4s ease .48s;text-align:center}
#ma.on .an{opacity:1;transform:translateY(0)}
.at{font-size:.76rem;letter-spacing:.36em;text-transform:uppercase;color:rgba(212,175,55,.7);opacity:0;transition:opacity .3s ease .6s;text-align:center}
#ma.on .at{opacity:1}
.ainf{flex:1;display:flex;flex-direction:column;gap:14px;opacity:0;transform:translateX(28px);transition:opacity .4s ease .56s,transform .4s ease .56s}
#ma.on .ainf{opacity:1;transform:translateX(0)}
@media(max-width:600px){.ainf{transform:translateY(16px)}#ma.on .ainf{transform:translateY(0)}}
.aln{width:38px;height:1px;background:linear-gradient(to right,var(--gold),transparent)}
@media(max-width:600px){.aln{margin:0 auto}}
.ad{font-family:'EB Garamond',serif;font-size:clamp(1.1rem,1.85vw,1.38rem);line-height:1.9;color:rgba(255,252,230,.92)}
.aig{font-family:'EB Garamond',serif;font-size:clamp(1rem,1.5vw,1.18rem);line-height:1.75;color:rgba(212,175,55,.75);font-style:italic}
.aig strong{font-style:normal;color:rgba(212,175,55,.9);font-size:.62rem;letter-spacing:.16em;text-transform:uppercase;display:block;margin-bottom:3px}

/* AGE GATE */
#ag{cursor:auto;position:fixed;inset:0;z-index:10000;display:flex;align-items:center;justify-content:center;background:rgba(3,1,0,.98);backdrop-filter:blur(20px);padding:clamp(16px,4vw,32px)}
.agb{text-align:center;max-width:480px;width:100%;display:flex;flex-direction:column;align-items:center;gap:16px}
.aglogo img{width:clamp(110px,28vw,155px);filter:drop-shadow(0 4px 18px rgba(0,0,0,.8))}
.aglr{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.04);border:1px solid rgba(212,175,55,.2);border-radius:6px;padding:7px 14px}
.agll{font-size:.48rem;letter-spacing:.28em;text-transform:uppercase;color:rgba(255,255,255,.6);padding-right:4px}
.agsep{width:1px;height:20px;background:rgba(212,175,55,.2);margin:0 4px}
.agdiv{width:64px;height:1px;background:linear-gradient(to right,transparent,var(--gold),transparent)}
.agtt{font-family:'Cinzel Decorative',serif;font-size:clamp(1.05rem,3.2vw,1.8rem);color:var(--gold);letter-spacing:.07em;text-shadow:0 0 20px rgba(212,175,55,.4);line-height:1.3}
.agsub{font-family:'EB Garamond',serif;font-size:clamp(.95rem,1.5vw,1.12rem);color:rgba(255,248,225,.85);line-height:1.88;max-width:380px}
.agsub strong{color:var(--gold)}
.agyes{cursor:pointer;font-family:'Cinzel',serif;font-size:.64rem;letter-spacing:.32em;text-transform:uppercase;padding:14px 0;border:1px solid rgba(212,175,55,.55);background:transparent;color:var(--gold);cursor:pointer;transition:background .3s,color .3s,border-color .3s;width:clamp(240px,72vw,340px)}
.agyes:hover,.agyes:active{background:rgba(212,175,55,.14);color:#fff;border-color:var(--gold)}
.agno{cursor:pointer;font-family:'Cinzel',serif;font-size:.48rem;letter-spacing:.26em;text-transform:uppercase;background:none;border:none;color:rgba(255,255,255,.4);cursor:pointer;transition:color .2s;padding:4px 0}
.agno:hover,.agno:active{color:rgba(255,255,255,.65)}
.agwrn{font-size:.42rem;letter-spacing:.16em;text-transform:uppercase;color:rgba(212,175,55,.3)}
@keyframes fu{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
</style></head><body>
